<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AB PRO ANALYZER</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --neon-cyan: #00f2ff; --neon-pink: #ff0055; --bg-dark: #0b0e11; --green: #10b981; --warning: #fbbf24; }
        
        /* موبائل فٹنگ اور زوم روکنا */
        html, body { 
            overflow: hidden; 
            touch-action: manipulation; 
            width: 100%; 
            height: 100%;
            position: fixed; /* اسکرین کو ہلنے سے روکتا ہے */
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
        }
        
        .panel { 
            width: 90%; 
            max-width: 360px; 
            background: #161a1e; 
            border-radius: 25px; 
            padding: 15px; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); 
            position: relative; 
            border: 3px solid #333; 
        }

        .panel::before { 
            content: ''; position: absolute; top: -5px; bottom: -5px; left: -5px; right: -5px; 
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink)); 
            border-radius: 30px; z-index: -1; 
        }

        .plane-window { height: 90px; background: #000; border-radius: 15px; border: 1px solid #2a2e33; position: relative; overflow: hidden; margin-bottom: 12px; }
        .plane { position: absolute; width: 45px; left: -60px; top: 40%; animation: fly 4s infinite linear; }
        @keyframes fly { 0% { left: -60px; } 100% { left: 110%; } }

        .lcd-display { background: #000; padding: 15px; text-align: center; border-radius: 15px; border: 1px solid #333; margin-bottom: 12px; }
        #predictionText { font-size: 45px; font-weight: 900; color: var(--neon-cyan); margin: 0; text-shadow: 0 0 10px var(--neon-cyan); }
        
        .manual-input-area { display: flex; gap: 5px; margin-bottom: 10px; }
        input { 
            flex: 1; background: #222; border: 1px solid var(--neon-cyan); 
            color: white; padding: 12px; border-radius: 8px; 
            text-align: center; font-size: 16px; outline: none; 
            /* موبائل کی بورڈ آنے پر زوم روکنے کے لیے */
            font-size: 16px !important; 
        }
        
        .btn-add { background: var(--neon-cyan); color: #000; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; }

        .btn-main { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: bold; font-size: 18px; cursor: pointer; 
            background: linear-gradient(to right, var(--neon-pink), #b0003a); 
            color: white; margin-bottom: 10px; 
        }
        
        .action-links { display: flex; justify-content: space-between; padding: 0 5px; }
        .link-btn { font-size: 10px; color: #777; background: none; border: none; text-decoration: underline; }

        .history-stack { display: flex; gap: 5px; overflow-x: auto; padding: 8px; background: #000; border-radius: 8px; margin-top: 10px; min-height: 30px; border: 1px solid #222; }
        .chip { background: #1e293b; color: var(--neon-cyan); font-size: 9px; padding: 4px 8px; border-radius: 4px; border: 1px solid #333; white-space: nowrap; }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="panel">
    <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; color: var(--neon-cyan);">
        <span>AB PRO v7.5 FIXED</span>
        <span id="status" style="color: var(--green);">● ONLINE</span>
    </div>

    <div class="plane-window">
        <img src="https://img.icons8.com/color/96/airplane.png" class="plane">
    </div>

    <div class="lcd-display">
        <div id="predictionText">--.--x</div>
        <div id="advice" style="font-size: 10px; color: var(--warning); margin-top: 5px;">ADD DATA</div>
    </div>

    <div class="manual-input-area">
        <input type="number" id="manualNum" placeholder="Input Value" step="0.01" inputmode="decimal">
        <button class="btn-add" onclick="addManual()">ADD</button>
    </div>

    <button class="btn-main" onclick="calculateNext()">GET PREDICTION</button>

    <div class="action-links">
        <label class="link-btn">
            <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="processImage()">
            SCAN 📸
        </label>
        <button class="link-btn" onclick="resetHistory()" style="color: var(--neon-pink);">RESET 🗑️</button>
    </div>

    <div class="history-stack" id="historyStack"></div>
</div>

<script>
    let rawData = [];
    let counter = 0;

    // ری سیٹ فنکشن
    function resetHistory() {
        if(confirm("صاف کریں؟")) {
            rawData = [];
            counter = 0;
            document.getElementById('historyStack').innerHTML = '';
            document.getElementById('predictionText').innerText = "--.--x";
        }
    }

    function addManual() {
        const input = document.getElementById('manualNum');
        const val = parseFloat(input.value);
        if (val > 0) {
            rawData.push(val);
            renderChips();
            input.value = "";
        }
    }

    async function processImage() {
        const file = document.getElementById('imageUpload').files[0];
        const status = document.getElementById('status');
        status.innerText = "● SCANNING...";
        const worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        const { data: { text } } = await worker.recognize(file);
        const foundNumbers = text.match(/\d+\.\d+/g);
        if (foundNumbers) {
            rawData = [...rawData, ...foundNumbers.map(Number)];
            renderChips();
            status.innerText = "● COMPLETE";
        }
        await worker.terminate();
    }

    function renderChips() {
        const stack = document.getElementById('historyStack');
        stack.innerHTML = rawData.map(n => `<span class="chip">${n}x</span>`).join('');
    }

    function calculateNext() {
        const display = document.getElementById('predictionText');
        const advice = document.getElementById('advice');
        if (rawData.length === 0) return alert("ڈیٹا ڈالیں");

        let base = rawData[counter % rawData.length];
        counter++;

        display.innerText = "WAIT";
        setTimeout(() => {
            let pred = (base < 1.4) ? (Math.random() * 1.2 + 1.8).toFixed(2) : (1.10 + Math.random() * 0.4).toFixed(2);
            display.innerText = pred + "x";
            advice.innerText = (pred > 1.6) ? "TARGET: 1.50x" : "TARGET: 1.15x";
            display.style.color = (pred > 1.6) ? "var(--green)" : "var(--neon-pink)";
        }, 400);
    }
</script>
</body>
</html>
